; PlatformIO Configuration for Pool Temperature Monitor
; =====================================================
; Supports ESP32 (recommended) and ESP8266 as fallback.

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    knolleary/PubSubClient@^2.8
build_flags =
    -DMQTT_MAX_PACKET_SIZE=256

; --- Primary target: Wemos/Lolin LOLIN32 Lite v1.0.0 ---
[env:esp32]
platform = espressif32
board = lolin32_lite
upload_speed = 921600
; Auto-reset via CH340 DTR/RTS. If auto-reset fails, short GPIO0 to GND
; while tapping RST on the board to enter flash mode.

; --- Fallback target: ESP8266 (higher deep-sleep current) ---
[env:esp8266]
platform = espressif8266
board = d1_mini
